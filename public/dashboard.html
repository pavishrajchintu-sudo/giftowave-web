<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Giftowave | Your Orders</title>
    <style>
        body { font-family: 'Montserrat', sans-serif; padding: 50px; background: #fdfaf7; }
        .order-card { background: #fff; padding: 20px; margin-bottom: 20px; border-left: 5px solid #d4a373; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <a href="index.html">← Back to Studio</a>
    <h1 style="font-family: 'Playfair Display'; margin-top:30px;">Your Orders</h1>
    <div id="orders-list">Connecting to vault...</div>

    <script>
        async function loadOrders() {
            const token = localStorage.getItem('gt_token');
            if(!token) { window.location.href = 'index.html'; return; }

            const res = await fetch('/api/user/orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const orders = await res.json();
            
            const list = document.getElementById('orders-list');
            list.innerHTML = orders.length === 0 ? "<p>No orders yet.</p>" : 
                orders.map(o => `
                    <div class="order-card">
                        <h3>${o.product}</h3>
                        <p>Status: <strong>${o.status}</strong></p>
                    </div>
                `).join('');
        }
        loadOrders();
    </script>
</body>
</html>
