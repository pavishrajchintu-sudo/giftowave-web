<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftowave | Your Studio Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4a373; --bg: #fdfaf7; --text: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; padding: 50px 10%; background: var(--bg); color: var(--text); }
        
        .profile-section { 
            background: #fff; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            display: flex; 
            align-items: center; 
            gap: 25px;
            margin-bottom: 50px;
        }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); }
        .profile-details h2 { margin: 0; font-family: 'Playfair Display'; font-size: 28px; }
        .profile-details p { margin: 5px 0 0 0; color: #888; font-size: 14px; }

        .order-card { 
            background: #fff; 
            padding: 25px; 
            margin-bottom: 20px; 
            border-left: 5px solid var(--accent); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge { 
            background: #f0f0f0; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .back-link { text-decoration: none; color: var(--accent); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Studio</a>

    <div id="user-profile" class="profile-section">
        </div>

    <h3 style="font-family: 'Playfair Display'; font-size: 24px; margin-bottom: 25px;">Order History</h3>
    <div id="orders-list">Connecting to vault...</div>

    <script>
        async function initDashboard() {
            const token = localStorage.getItem('gt_token');
            const user = JSON.parse(localStorage.getItem('gt_user'));

            if(!token || !user) {
                window.location.href = 'index.html';
                return;
            }

            // 1. Render Profile Details
            document.getElementById('user-profile').innerHTML = `
                <img src="${user.picture}" class="profile-img" alt="Profile">
                <div class="profile-details">
                    <h2>${user.name}</h2>
                    <p>${user.email}</p>
                    <span style="font-size: 10px; color: var(--accent); font-weight: bold; letter-spacing: 1px; text-transform: uppercase;">Premium Member</span>
                </div>
            `;

            // 2. Fetch Orders
            try {
                const res = await fetch('/api/user/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await res.json();
                
                const list = document.getElementById('orders-list');
                if(orders.length === 0) {
                    list.innerHTML = `
                        <div style="text-align: center; padding: 50px; border: 1px dashed #ccc;">
                            <p style="color: #888;">No curations found in your vault.</p>
                            <a href="index.html" class="back-link" style="color: black;">Start Creating →</a>
                        </div>
                    `;
                } else {
                    list.innerHTML = orders.map(o => `
                        <div class="order-card">
                            <div>
                                <h4 style="margin: 0; font-size: 18px;">${o.product}</h4>
                                <p style="margin: 5px 0 0 0; font-size: 12px; color: #aaa;">Ordered on ${new Date(o.date).toLocaleDateString()}</p>
                            </div>
                            <div class="status-badge">${o.status}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('orders-list').innerHTML = "<p>Error loading orders. Please refresh.</p>";
            }
        }

        initDashboard();
    </script>
</body>
</html>
