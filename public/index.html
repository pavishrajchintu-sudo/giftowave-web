<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon.in: Giftowave</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f3f3f3; margin: 0; }
        
        /* Navigation */
        .nav-bar { background-color: #131921; padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: bold; }
        .cart { position: relative; }
        .cart-icon { font-size: 28px; color: #f08804; cursor: pointer; }
        .cart-count { background-color: #f08804; color: black; border-radius: 50%; padding: 2px 7px; font-size: 14px; font-weight: bold; position: absolute; top: -10px; right: -10px; }

        /* The Grid & Card Size Limits */
        .product-grid { padding: 30px; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        .amazon-card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; width: 260px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* THIS STOPS THE IMAGES FROM BLOWING UP THE SCREEN */
        .amazon-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; }
        
        .amazon-card h3 { margin: 0; font-size: 17px; color: #0f1111; }
        .subtitle { color: #565959; font-size: 13px; margin-top: 5px; }
        .price { color: #B12704; font-size: 22px; font-weight: bold; margin: 12px 0; }

        /* Buttons */
        button { border-radius: 20px; font-weight: bold; width: 100%; padding: 10px; cursor: pointer; border: none; margin-top: 8px; transition: 0.2s; }
        .add-btn { background-color: #ffd814; }
        .add-btn:hover { background-color: #f7ca00; }
        .buy-btn { background-color: #ffa41c; }
        .buy-btn:hover { background-color: #fa8900; }

        /* The Hidden Pop-Up (Modal) */
        #payment-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; text-align: center; width: 320px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; color: #333; font-weight: bold; }
        .close-btn:hover { color: red; }
        
        /* Payment Image Limits */
        .payment-img { width: 220px; height: 220px; object-fit: contain; margin-top: 15px; border: 2px solid #ddd; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="logo">Giftowave.in</div>
        <div class="cart">
            <i class="bi bi-cart3 cart-icon"></i>
            <span class="cart-count" id="cart-counter">0</span>
        </div>
    </nav>

    <div class="product-grid">
        <div class="amazon-card">
            <img src="priyanka.jpeg" alt="Main Character Energy">
            <h3>Main Character Energy</h3>
            <p class="subtitle">Personalized Vogue Cover</p>
            <p class="price">₹999</p>
            <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            <button class="buy-btn" onclick="showPayment()">Buy Now</button>
        </div>

        <div class="amazon-card">
            <img src="friends.jpeg" alt="Friends Edition">
            <h3>The F.R.I.E.N.D.S Issue</h3>
            <p class="subtitle">Squad Memories Magazine</p>
            <p class="price">₹1,299</p>
            <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            <button class="buy-btn" onclick="showPayment()">Buy Now</button>
        </div>

        <div class="amazon-card">
            <img src="kylo.jpeg" alt="Happy Birthday Kylo">
            <h3>Paw Print Special</h3>
            <p class="subtitle">Celebrate Your Pet</p>
            <p class="price">₹799</p>
            <button class="add-btn" onclick="addToCart()">Add to Cart</button>
            <button class="buy-btn" onclick="showPayment()">Buy Now</button>
        </div>
    </div>

    <div id="payment-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePayment()">&times;</span>
            <h2>Complete Your Order</h2>
            <p>Scan the QR code below to pay securely.</p>
            <img src="payment.jpeg" alt="Payment QR Code" class="payment-img">
        </div>
    </div>

    <script>
        let cartItems = 0; 

        function addToCart() {
            cartItems++; 
            document.getElementById('cart-counter').innerText = cartItems; 
        }

        function showPayment() {
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closePayment() {
            document.getElementById('payment-modal').style.display = 'none';
        }
    </script>
</body>
</html>
