<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftowave | Boutique Studio</title>
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* ... (Your existing CSS) ... */
        :root { --accent: #d4a373; --bg: #fdfaf7; --text: #1a1a1a; --glass: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; scroll-behavior: smooth; color: var(--text); }
        nav { background: var(--glass); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top:0; z-index: 100; }
        .logo-img { height: 40px; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; transition: 0.5s; visibility: hidden; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .sidebar.active { width: 300px; visibility: visible; }
        .sidebar-links a { padding: 15px 32px; text-decoration: none; font-size: 14px; color: #444; display: flex; align-items: center; gap: 15px; transition: 0.3s; border-left: 3px solid transparent; cursor: pointer; }
        .sidebar-links a:hover { background: #f9f9f9; color: var(--accent); border-left: 3px solid var(--accent); }
        .hero { height: 80vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1513201099705-a9746e1e201f?auto=format&fit=crop&q=80&w=2000'); background-size: cover; background-attachment: fixed; text-align: center; }
        .hero-card { background: white; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); transform-style: preserve-3d; transition: transform 0.1s; }
        .reveal { opacity: 0; transform: translateY(40px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; padding: 100px 10%; }
        .card { background: #fff; padding: 20px; transition: 0.5s; position: relative; }
        .card img { width: 100%; height: 450px; object-fit: cover; }
        .side-cart { height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; right: 0; background: #fff; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .side-cart.active { width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 50px; width: 90%; max-width: 450px; text-align: center;}
        .btn-black { background: #000; color: #fff; border: none; padding: 16px 30px; cursor: pointer; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; width: 100%; margin-top: 15px; transition: 0.3s; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; font-family: 'Montserrat'; outline: none; }
    </style>
</head>
<body>

    <script>
        let cart = [];
        
        // --- 1. SESSION MANAGEMENT (Same as your file) ---
        window.onload = function() {
            const token = localStorage.getItem('gt_token');
            const user = JSON.parse(localStorage.getItem('gt_user'));
            if(token && user) {
                updateUIForLoggedInUser(user);
            }
        };

        function handleProfileClick() {
            const token = localStorage.getItem('gt_token');
            if (token) {
                window.location.href = 'dashboard.html';
            } else {
                openLoginModal();
            }
        }

        function handleCredentialResponse(response) {
            fetch('/api/auth/google', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ idToken: response.credential })
            })
            .then(res => res.json())
            .then(data => {
                localStorage.setItem('gt_token', data.token);
                localStorage.setItem('gt_user', JSON.stringify(data.user));
                updateUIForLoggedInUser(data.user);
                closeLoginModal();
            });
        }

        function updateUIForLoggedInUser(user) {
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-status').innerText = "Premium Member";
            document.getElementById('auth-link-text').innerText = "Your Profile";
            document.getElementById('logout-btn').style.display = "flex";
            if(user.isAdmin) document.getElementById('founder-link').style.display = "flex";
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        function openLoginModal() { 
            toggleSidebar(false);
            document.getElementById('loginModal').style.display = 'flex'; 
        }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function openCheckoutModal() { toggleCart(false); document.getElementById('checkoutModal').style.display = 'flex'; }
        function closeCheckoutModal() { document.getElementById('checkoutModal').style.display = 'none'; }

        // --- 2. UPDATED SECURE RAZORPAY PAYMENT LOGIC ---
        async function processPayment() {
            const token = localStorage.getItem('gt_token');
            if(!token) return openLoginModal(); 

            const totalAmount = cart.reduce((s, i) => s + i.p, 0);
            const address = document.getElementById('custAddress').value;

            if(!address) return alert("Please provide a shipping address.");

            try {
                // Step A: Create Order on your Backend
                const orderRes = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ amount: totalAmount })
                });
                const orderData = await orderRes.json();

                if(!orderData.id) throw new Error("Order creation failed");

                // Step B: Configure Razorpay Checkout
                const options = {
                    "key": "rzp_test_SV5QxCbNRxErQt", // PASTE YOUR TEST KEY ID HERE
                    "amount": orderData.amount,
                    "currency": "INR",
                    "name": "Giftowave Studio",
                    "description": "Custom Magazine Order",
                    "image": "logo.jpeg",
                    "order_id": orderData.id, 
                    "handler": async function (response) {
                        // This code runs when payment is successful
                        const saveRes = await fetch('/api/orders', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json', 
                                'Authorization': `Bearer ${token}` 
                            },
                            body: JSON.stringify({
                                product: cart.map(i=>i.n).join(", "),
                                amount: totalAmount,
                                address: address,
                                paymentId: response.razorpay_payment_id,
                                razorpayOrderId: response.razorpay_order_id
                            })
                        });

                        if(saveRes.ok) {
                            alert("Payment Successful! Your memories are being curated.");
                            closeCheckoutModal();
                            cart = [];
                            updateCartUI();
                            
                            // Redirect to WhatsApp for photos
                            const msg = encodeURIComponent(`Hi! I just placed an order on Giftowave. Payment ID: ${response.razorpay_payment_id}. Here are my details...`);
                            window.location.href = `https://wa.me/919480119825?text=${msg}`;
                        }
                    },
                    "prefill": {
                        "name": document.getElementById('custName').value,
                        "contact": document.getElementById('custPhone').value
                    },
                    "theme": { "color": "#d4a373" }
                };

                const rzp1 = new Razorpay(options);
                rzp1.open();

            } catch (err) {
                console.error("Payment Error:", err);
                alert("Something went wrong with the payment gateway.");
            }
        }

        // --- 3. UI INTERACTIVE (Same as your file) ---
        // ... (toggleSidebar, addToCart, updateCartUI, etc.) ...
        const observer = new IntersectionObserver((e) => e.forEach(en => en.isIntersecting && en.target.classList.add('active')), {threshold: 0.1});
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        function toggleSidebar(o) { const s = document.getElementById("mySidebar"); s.style.width = o ? "300px" : "0"; s.classList.toggle("active", o); }
        function toggleCart(o) { document.getElementById("sideCart").className = o ? "side-cart active" : "side-cart"; }
        function addToCart(n, p) { cart.push({n, p}); updateCartUI(); toggleCart(true); }
        
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            const summary = document.getElementById('cart-summary');
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:12px;">EMPTY SELECTION...</p>';
                summary.style.display = "none";
            } else {
                list.innerHTML = cart.map((i, idx) => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px;">
                        <span>${i.n}</span>
                        <span>${i.p} <i class="bi bi-x" style="cursor:pointer" onclick="removeItem(${idx})"></i></span>
                    </div>`).join('');
                document.getElementById('cart-total-price').innerText = cart.reduce((s, i) => s + i.p, 0);
                summary.style.display = "block";
            }
        }
        function removeItem(idx) { cart.splice(idx, 1); updateCartUI(); }
        function scrollToProducts() { document.getElementById('product-grid').scrollIntoView({ behavior: 'smooth' }); }

        document.addEventListener('mousemove', (e) => {
            const card = document.getElementById('parallax-card');
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            if(card) card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
