<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftowave | Boutique Studio</title>
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --accent: #d4a373; --bg: #fdfaf7; --text: #1a1a1a; --glass: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; scroll-behavior: smooth; color: var(--text); }
        nav { background: var(--glass); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top:0; z-index: 100; }
        .logo-img { height: 40px; }
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; transition: 0.5s; visibility: hidden; overflow-y: auto; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .sidebar.active { width: 300px; visibility: visible; }
        .sidebar-links a { padding: 15px 32px; text-decoration: none; font-size: 14px; color: #444; display: flex; align-items: center; gap: 15px; transition: 0.3s; border-left: 3px solid transparent; cursor: pointer; }
        .sidebar-links a:hover { background: #f9f9f9; color: var(--accent); border-left: 3px solid var(--accent); }
        .hero { height: 80vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1513201099705-a9746e1e201f?auto=format&fit=crop&q=80&w=2000'); background-size: cover; background-attachment: fixed; text-align: center; }
        .hero-card { background: white; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); transform-style: preserve-3d; transition: transform 0.1s; }
        .reveal { opacity: 0; transform: translateY(40px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; padding: 100px 10%; }
        .card { background: #fff; padding: 20px; transition: 0.5s; position: relative; }
        .card img { width: 100%; height: 450px; object-fit: cover; }
        .side-cart { height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; right: 0; background: #fff; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .side-cart.active { width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 50px; width: 90%; max-width: 450px; text-align: center;}
        .btn-black { background: #000; color: #fff; border: none; padding: 16px 30px; cursor: pointer; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; width: 100%; margin-top: 15px; transition: 0.3s; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; font-family: 'Montserrat'; outline: none; }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <span style="position:absolute; top:30px; right:25px; cursor:pointer; font-size:24px;" onclick="toggleSidebar(false)"><i class="bi bi-x-lg"></i></span>
        <div style="padding: 100px 32px 20px 32px; border-bottom: 1px solid #f0f0f0;">
            <h4 id="user-name" style="margin:0; font-family:'Playfair Display'; font-size:24px;">Guest Explorer</h4>
            <p id="user-status" style="font-size:10px; color:#aaa; letter-spacing:1px; margin-top:5px; text-transform:uppercase;">Sign in via Profile</p>
        </div>
        <div class="sidebar-links">
            <a href="#home" onclick="toggleSidebar(false)"><i class="bi bi-house"></i> Home</a>
            <a onclick="handleProfileClick()"><i class="bi bi-person"></i> <span id="auth-link-text">Sign In / Profile</span></a>
            <a href="dashboard.html"><i class="bi bi-bag-check"></i> Your Orders</a>
            <a id="founder-link" href="founder-dashboard.html" style="display:none; color: var(--accent); font-weight: bold;"><i class="bi bi-shield-lock"></i> Founder Panel</a>
            <a href="https://wa.me/919480119825" target="_blank"><i class="bi bi-whatsapp"></i> Support</a>
            <a id="logout-btn" style="display:none; color:red;" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
    </div>

    <div id="loginModal" class="overlay">
        <div class="modal-content">
            <h2 style="font-family:'Playfair Display'">Giftowave Identity</h2>
            <div id="g_id_onload" data-client_id="191068266437-c5pfe4s011l2k3jhdpfadih3ndan1sfv.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
            <div class="g_id_signin" data-type="standard"></div>
            <p style="margin-top:20px; font-size:11px; cursor:pointer;" onclick="closeLoginModal()">Continue as Guest</p>
        </div>
    </div>

    <div id="checkoutModal" class="overlay">
        <div class="modal-content">
            <h2 style="font-family:'Playfair Display'">Shipping</h2>
            <input type="text" id="custName" placeholder="Full Name">
            <input type="text" id="custPhone" placeholder="WhatsApp Number">
            <textarea id="custAddress" placeholder="Full Address" rows="3"></textarea>
            <button class="btn-black" onclick="processPayment()">Confirm & Pay</button>
            <p style="cursor:pointer; font-size:11px; color:#aaa;" onclick="closeCheckoutModal()">CANCEL</p>
        </div>
    </div>

    <nav id="home">
        <div style="display:flex; align-items:center; gap:30px;">
            <i class="bi bi-list" style="font-size: 24px; cursor: pointer;" onclick="toggleSidebar(true)"></i>
            <img src="logo.jpeg" alt="Giftowave" class="logo-img">
        </div>
        <div onclick="toggleCart(true)" style="background:#000; color:#fff; padding:10px 20px; border-radius:30px; cursor:pointer;">
            <span id="cart-count">0</span> <i class="bi bi-bag"></i>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-card" id="parallax-card">
            <h1 style="font-family:'Playfair Display'; font-size:50px;">Handcrafted <br> Memories</h1>
            <button class="btn-black" style="width:auto;" onclick="scrollToProducts()">EXPLORE</button>
        </div>
    </div>

    <div class="grid" id="product-grid">
        <div class="card reveal">
            <img src="priyanka.jpeg" alt="Vogue">
            <h3>The Vogue Edition</h3>
            <p>999 INR</p>
            <button class="btn-black" onclick="addToCart('The Vogue Edition', 999)">Add to Cart</button>
        </div>
    </div>

    <div id="sideCart" class="side-cart">
        <div style="padding:40px;">
            <h2 style="font-family:'Playfair Display'">Boutique Cart</h2>
            <div id="cart-items-list"></div>
            <div id="cart-summary" style="display:none;">
                <p>SUBTOTAL: <span id="cart-total-price">0</span> INR</p>
                <button class="btn-black" onclick="openCheckoutModal()">Secure Checkout</button>
            </div>
            <p onclick="toggleCart(false)" style="cursor:pointer; margin-top:20px;">Close Cart</p>
        </div>
    </div>

    <script>
        let cart = [];
        window.onload = () => {
            const token = localStorage.getItem('gt_token');
            const user = JSON.parse(localStorage.getItem('gt_user'));
            if(token && user) updateUIForLoggedInUser(user);
        };

        function updateUIForLoggedInUser(user) {
            const nameEl = document.getElementById('user-name');
            if(nameEl) nameEl.innerText = user.name;
            const statusEl = document.getElementById('user-status');
            if(statusEl) statusEl.innerText = "Premium Member";
            const logoutBtn = document.getElementById('logout-btn');
            if(logoutBtn) logoutBtn.style.display = "flex";
            if(user.isAdmin) {
                const founderLink = document.getElementById('founder-link');
                if(founderLink) founderLink.style.display = "flex";
            }
        }

        async function processPayment() {
            const token = localStorage.getItem('gt_token');
            if(!token) return openLoginModal();
            const total = cart.reduce((s,i)=>s+i.p, 0);
            
            const res = await fetch('/api/create-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                body: JSON.stringify({amount: total})
            });
            const orderData = await res.json();

            const options = {
                "key": "rzp_test_SV5QxCbNRxErQt",
                "amount": orderData.amount,
                "currency": "INR",
                "name": "Giftowave Studio",
                "order_id": orderData.id,
                "handler": async function (response) {
                    await fetch('/api/orders', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
                        body: JSON.stringify({
                            product: cart.map(i=>i.n).join(", "),
                            amount: total,
                            address: document.getElementById('custAddress').value,
                            paymentId: response.razorpay_payment_id
                        })
                    });
                    alert("Order Placed!");
                    window.location.href = `https://wa.me/919480119825?text=OrderID:${response.razorpay_payment_id}`;
                }
            };
            new Razorpay(options).open();
        }

        // Sidebar/Cart Helpers
        function toggleSidebar(o) { const s = document.getElementById("mySidebar"); if(s) { s.style.width = o ? "300px" : "0"; s.classList.toggle("active", o); } }
        function toggleCart(o) { const c = document.getElementById("sideCart"); if(c) c.className = o ? "side-cart active" : "side-cart"; }
        function addToCart(n, p) { cart.push({n, p}); updateCartUI(); toggleCart(true); }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            const summary = document.getElementById('cart-summary');
            list.innerHTML = cart.map(i => `<p>${i.n} - ${i.p} INR</p>`).join('');
            document.getElementById('cart-total-price').innerText = cart.reduce((s,i)=>s+i.p,0);
            summary.style.display = cart.length > 0 ? "block" : "none";
        }
        function openLoginModal() { toggleSidebar(false); document.getElementById('loginModal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
        function openCheckoutModal() { toggleCart(false); document.getElementById('checkoutModal').style.display = 'flex'; }
        function closeCheckoutModal() { document.getElementById('checkoutModal').style.display = 'none'; }
        function handleProfileClick() { if(localStorage.getItem('gt_token')) window.location.href = 'dashboard.html'; else openLoginModal(); }
        function logout() { localStorage.clear(); window.location.reload(); }
        function scrollToProducts() { document.getElementById('product-grid').scrollIntoView({behavior:'smooth'}); }
    </script>
</body>
</html>
