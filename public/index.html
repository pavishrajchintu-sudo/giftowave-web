<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftowave | Dynamic Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <style>
        :root { --accent: #d4a373; --bg: #fdfaf7; --text: #1a1a1a; --glass: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; scroll-behavior: smooth; color: var(--text); }

        /* Navigation with Blur */
        nav { background: var(--glass); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top:0; z-index: 100; }
        .logo-img { height: 40px; filter: grayscale(1); transition: 0.3s; }
        .logo-img:hover { filter: grayscale(0); }

        /* Dynamic Hero Section */
        .hero { height: 80vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.05)), url('https://images.unsplash.com/photo-1513201099705-a9746e1e201f?auto=format&fit=crop&q=80&w=2000'); background-size: cover; background-attachment: fixed; text-align: center; }
        .hero-card { background: white; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); transform-style: preserve-3d; transition: transform 0.1s; }

        /* Reveal Animation on Scroll */
        .reveal { opacity: 0; transform: translateY(40px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Modernized Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; padding: 100px 10%; }
        .card { background: #fff; padding: 20px; transition: 0.5s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(0,0,0,0.08); }
        .card img { width: 100%; height: 450px; object-fit: cover; transition: 0.7s; }
        .card:hover img { transform: scale(1.05); }

        /* Floating Side Cart */
        .side-cart { height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; right: 0; background: #fff; transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .side-cart.active { width: 400px; }
        .cart-content { padding: 40px; }

        /* Buttons with Magnetic Interaction */
        .btn-black { background: #000; color: #fff; border: none; padding: 16px 30px; cursor: pointer; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; width: 100%; margin-top: 15px; transition: 0.3s; position: relative; }
        .btn-black:hover { background: var(--accent); letter-spacing: 4px; }

        /* Sidebar Visibility */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; transition: 0.5s; visibility: hidden; }
        .sidebar.active { width: 300px; visibility: visible; border-right: 1px solid #eee; }

        /* Checkout Overlay glassmorphism */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 50px; width: 90%; max-width: 450px; animation: modalIn 0.4s ease-out; }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        input, textarea { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; font-family: 'Montserrat'; font-size: 13px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <span style="position:absolute; top:30px; left:30px; cursor:pointer; font-size:24px;" onclick="toggleSidebar(false)"><i class="bi bi-x-lg"></i></span>
        <div style="padding: 100px 40px;">
            <a href="#home" style="display:block; font-family:'Playfair Display'; font-size:32px; text-decoration:none; color:#000; margin-bottom:20px;">Home</a>
            <a href="#about" style="display:block; font-size:14px; text-decoration:none; color:#777; letter-spacing:2px; text-transform:uppercase;">Our Mission</a>
        </div>
    </div>

    <div id="sideCart" class="side-cart">
        <span style="position:absolute; top:30px; left:30px; cursor:pointer; font-size:24px;" onclick="toggleCart(false)"><i class="bi bi-arrow-right"></i></span>
        <div class="cart-content">
            <h2 style="font-family:'Playfair Display'; font-size:30px; margin-bottom:40px;">Boutique Cart</h2>
            <div id="cart-items-list">
                <p style="color:#999; font-size:12px; letter-spacing:1px;">CURATING YOUR SELECTION...</p>
            </div>
            <div id="cart-summary" style="margin-top:40px; display:none; border-top:1px solid #eee; padding-top:20px;">
                <p style="letter-spacing:2px; font-size:13px;">SUBTOTAL: <span id="cart-total-price">0</span> INR</p>
                <button class="btn-black" onclick="openCheckoutModal()">Secure Checkout</button>
            </div>
        </div>
    </div>

    <nav id="home">
        <div style="display:flex; align-items:center; gap:30px;">
            <i class="bi bi-list" style="font-size: 24px; cursor: pointer;" onclick="toggleSidebar(true)"></i>
            <img src="logo.jpeg" alt="Giftowave" class="logo-img">
        </div>
        <div class="cart-icon-wrapper" onclick="toggleCart(true)" style="background:#000; color:#fff; padding:10px 20px; border-radius:30px;">
            <span style="font-size:12px; letter-spacing:1px; margin-right:10px;">CART</span>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-card" id="parallax-card">
            <h1 style="font-family:'Playfair Display'; font-size:50px; margin:0;">The Magazine <br> Experience</h1>
            <p style="letter-spacing:5px; font-size:11px; color:#888; margin-top:20px;">HANDCRAFTED IN IIT KHARAGPUR</p>
            <button class="btn-black" style="width:auto; padding:18px 40px; margin-top:30px;" onclick="scrollToProducts()">EXPLORE COLLECTION</button>
        </div>
    </div>

    <div class="grid" id="product-grid">
        <div class="card reveal">
            <img src="priyanka.jpeg" alt="Vogue">
            <h3>The Vogue Edition</h3>
            <p style="color:var(--accent); font-size:14px; letter-spacing:2px;">999.00 INR</p>
            <button class="btn-black" onclick="addToCart('The Vogue Edition', 999)">Select Edition</button>
        </div>
        <div class="card reveal">
            <img src="friends.jpeg" alt="Friends">
            <h3>The F.R.I.E.N.D.S Issue</h3>
            <p style="color:var(--accent); font-size:14px; letter-spacing:2px;">1,299.00 INR</p>
            <button class="btn-black" onclick="addToCart('The F.R.I.E.N.D.S Issue', 1299)">Select Edition</button>
        </div>
    </div>

    <div id="checkoutModal" class="overlay">
        <div class="modal-content">
            <h2 style="font-family:'Playfair Display'; font-size:28px; margin-bottom:30px;">Shipping Details</h2>
            <input type="text" id="custName" placeholder="Legal Full Name">
            <input type="email" id="custEmail" placeholder="Email for Digital Receipt">
            <input type="text" id="custPhone" placeholder="Active WhatsApp Number">
            <textarea id="custAddress" placeholder="Complete Shipping Address" rows="3"></textarea>
            <button class="btn-black" onclick="processPayment()">Confirm Transaction</button>
            <p style="text-align:center; cursor:pointer; font-size:11px; color:#aaa; margin-top:20px; letter-spacing:1px;" onclick="closeModal()">RETURN TO CATALOG</p>
        </div>
    </div>

    <script>
        let cart = [];

        // Dynamic Intersection Observer for Scroll Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Parallax Effect for Hero
        document.addEventListener('mousemove', (e) => {
            const card = document.getElementById('parallax-card');
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        function toggleSidebar(open) { document.getElementById("mySidebar").className = open ? "sidebar active" : "sidebar"; }
        function toggleCart(open) { document.getElementById("sideCart").className = open ? "side-cart active" : "side-cart"; }
        function closeModal() { document.getElementById("checkoutModal").style.display = "none"; }
        function scrollToProducts() { document.getElementById('product-grid').scrollIntoView({ behavior: 'smooth' }); }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
            toggleCart(true);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            const summary = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:12px;">CURATING YOUR SELECTION...</p>';
                summary.style.display = "none";
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:12px; letter-spacing:1px;">
                        <span>${item.name}</span>
                        <span>${item.price} <i class="bi bi-x-circle" style="cursor:pointer; margin-left:10px;" onclick="removeItem(${index})"></i></span>
                    </div>
                `).join('');
                document.getElementById('cart-total-price').innerText = cart.reduce((s, i) => s + i.price, 0);
                summary.style.display = "block";
            }
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function openCheckoutModal() {
            toggleCart(false);
            document.getElementById("checkoutModal").style.display = "flex";
        }

        function processPayment() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            if (!name || !phone) return alert("All fields are mandatory for premium delivery.");
            
            // Trigger Mock Razorpay logic here (as we discussed before)
            alert("Rerouting to Payment Gateway...");
            // ... (Your existing payment/fetch logic)
        }
    </script>
</body>
</html>
