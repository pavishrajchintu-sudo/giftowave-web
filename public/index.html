<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giftowave | Premium Gifting Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <style>
        :root { --accent: #d4a373; --bg: #fdfaf7; --text: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; scroll-behavior: smooth; color: var(--text); }

        /* Navigation */
        nav { background: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top:0; z-index: 100; }
        .logo-img { height: 45px; cursor: pointer; }
        .cart-icon-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; }
        #cart-count { position: absolute; top: -8px; right: -10px; background: var(--accent); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* Side Cart Styling */
        .side-cart { height: 100%; width: 0; position: fixed; z-index: 1001; top: 0; right: 0; background: #fff; overflow-x: hidden; transition: 0.5s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding-top: 60px; }
        .side-cart.active { width: 350px; }
        .cart-content { padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
        .close-cart { position: absolute; top: 20px; left: 20px; font-size: 24px; cursor: pointer; }

        /* Sidebar Styling */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: #fff; overflow-x: hidden; transition: 0.5s; visibility: hidden; padding-top: 20px; }
        .sidebar.active { width: 280px; visibility: visible; }
        .sidebar a { padding: 15px 32px; text-decoration: none; font-size: 14px; color: #555; display: block; }

        /* Buttons */
        .btn-black { background: #000; color: #fff; border: none; padding: 14px 30px; cursor: pointer; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-black:hover { background: var(--accent); }

        /* Grid */
        .grid { display: flex; justify-content: center; gap: 40px; padding: 60px 5%; flex-wrap: wrap; }
        .card { width: 300px; text-align: center; background: #fff; padding: 15px; border: 1px solid #f9f9f9; }
        .card img { width: 100%; height: 400px; object-fit: cover; }

        /* Checkout Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 40px; width: 90%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #eee; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <span style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:30px;" onclick="toggleSidebar(false)">&times;</span>
        <div style="padding: 20px 32px; border-bottom: 1px solid #eee;"><h4 style="margin:0; font-family:'Playfair Display';">Menu</h4></div>
        <a href="#home">Home</a>
        <a href="#about">Our Story</a>
        <a href="https://wa.me/919740979918" target="_blank">Support</a>
    </div>

    <div id="sideCart" class="side-cart">
        <span class="close-cart" onclick="toggleCart(false)">&times;</span>
        <div class="cart-content">
            <h2 style="font-family:'Playfair Display'; border-bottom: 2px solid #000; padding-bottom:10px;">Your Cart</h2>
            <div id="cart-items-list">
                <p style="color:#999; font-size:13px;">Your cart is empty.</p>
            </div>
            <div id="cart-summary" style="margin-top:20px; display:none;">
                <p><strong>Total: Rs. <span id="cart-total-price">0</span></strong></p>
                <button class="btn-black" onclick="openCheckoutModal()">Checkout Now</button>
            </div>
        </div>
    </div>

    <nav id="home">
        <div style="display:flex; align-items:center; gap:20px;">
            <i class="bi bi-list" style="font-size: 28px; cursor: pointer;" onclick="toggleSidebar(true)"></i>
            <img src="logo.jpeg" alt="Giftowave" class="logo-img">
        </div>
        <div class="cart-icon-wrapper" onclick="toggleCart(true)">
            <i class="bi bi-bag" style="font-size: 22px;"></i>
            <span id="cart-count">0</span>
        </div>
    </nav>

    <div class="grid">
        <div class="card">
            <img src="priyanka.jpeg" alt="Vogue">
            <h3>The Vogue Edition</h3>
            <p style="color:var(--accent);">Rs. 999.00</p>
            <button class="btn-black" onclick="addToCart('The Vogue Edition', 999)">Add to Cart</button>
        </div>
        <div class="card">
            <img src="friends.jpeg" alt="Friends">
            <h3>The F.R.I.E.N.D.S Issue</h3>
            <p style="color:var(--accent);">Rs. 1,299.00</p>
            <button class="btn-black" onclick="addToCart('The F.R.I.E.N.D.S Issue', 1299)">Add to Cart</button>
        </div>
    </div>

    <div id="checkoutModal" class="overlay">
        <div class="modal-content">
            <h2 style="font-family:'Playfair Display'; margin-top:0;">Shipping & Login</h2>
            <p style="font-size:12px; color:#888; margin-bottom:20px;">Secure your order with delivery details.</p>
            <input type="text" id="custName" placeholder="Full Name">
            <input type="email" id="custEmail" placeholder="Email Address">
            <input type="text" id="custPhone" placeholder="Mobile Number">
            <textarea id="custAddress" placeholder="Full Address with Pincode" rows="3"></textarea>
            <button class="btn-black" onclick="processPayment()">Confirm & Pay</button>
            <p style="text-align:center; cursor:pointer; font-size:12px; color:#999; margin-top:10px;" onclick="closeModal()">Back to Cart</p>
        </div>
    </div>

    <script>
        let cart = [];
        
        function toggleSidebar(open) { document.getElementById("mySidebar").className = open ? "sidebar active" : "sidebar"; }
        function toggleCart(open) { document.getElementById("sideCart").className = open ? "side-cart active" : "side-cart"; }
        function closeModal() { document.getElementById("checkoutModal").style.display = "none"; }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
            toggleCart(true); // Show the cart as soon as item is added
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            const summary = document.getElementById('cart-summary');
            const totalSpan = document.getElementById('cart-total-price');
            
            if (cart.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:13px;">Your cart is empty.</p>';
                summary.style.display = "none";
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>Rs. ${item.price} <i class="bi bi-trash" style="cursor:pointer; margin-left:10px;" onclick="removeItem(${index})"></i></span>
                    </div>
                `).join('');
                const total = cart.reduce((sum, item) => sum + item.price, 0);
                totalSpan.innerText = total;
                summary.style.display = "block";
            }
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function openCheckoutModal() {
            toggleCart(false);
            document.getElementById("checkoutModal").style.display = "flex";
        }

        function processPayment() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const total = cart.reduce((sum, item) => sum + item.price, 0);

            if (!name || !phone) return alert("Please fill shipping details.");

            const options = {
                "key": "rzp_test_YOUR_KEY", // Change to Live Key when ready
                "amount": total * 100,
                "currency": "INR",
                "name": "Giftowave",
                "image": "logo.jpeg",
                "handler": function (res) {
                    fetch('/api/orders', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ customerName: name, phone, product: cart.map(i=>i.name).join(", "), status: "Paid" })
                    });
                    window.open(`https://wa.me/919740979918?text=Paid for ${cart.map(i=>i.name).join(", ")}. PaymentID: ${res.razorpay_payment_id}`);
                    alert("Order Placed!");
                },
                "prefill": { "name": name, "contact": phone },
                "theme": { "color": "#d4a373" }
            };
            new Razorpay(options).open();
        }
    </script>
</body>
</html>
