<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Giftowave | Founder Panel</title>
    <link rel="icon" type="image/jpeg" href="logo.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat'; background: #000; color: #fff; padding: 50px; }
        .admin-card { background: #111; padding: 30px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #333; color: #d4a373; text-transform: uppercase; font-size: 11px; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 13px; }
        .ship-btn { background: #d4a373; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1 style="font-family: 'Playfair Display';">Founder Control</h1>
        <p style="color: #666;">Manage all incoming Giftowave orders.</p>

        <table>
            <thead>
                <tr>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-rows">
                </tbody>
        </table>
    </div>

    <script>
        window.onload = async function() {
            const token = localStorage.getItem('gt_token');
            const user = JSON.parse(localStorage.getItem('gt_user'));

            // SECURITY: Kick out anyone who isn't the admin
            if (!user || !user.isAdmin) {
                alert("Access Denied.");
                window.location.href = 'index.html';
                return;
            }

            const res = await fetch('/api/admin/all-orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const orders = await res.json();

            const tbody = document.getElementById('admin-rows');
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>${order.userId ? order.userId.name : 'Guest'}</td>
                    <td>${order.product}</td>
                    <td>${order.address}</td>
                    <td><span style="color:${order.status === 'Shipped' ? '#4CAF50' : '#d4a373'}">${order.status}</span></td>
                    <td>
                        <button class="ship-btn" onclick="markAsShipped('${order._id}')">MARK SHIPPED</button>
                    </td>
                </tr>
            `).join('');
        };

        async function markAsShipped(id) {
            const token = localStorage.getItem('gt_token');
            await fetch(`/api/admin/order/${id}/ship`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            window.location.reload();
        }
    </script>
</body>
</html>
